services:
  ai-core:
    build: ./python_ai
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}

  backend:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - PYTHON_AI_BASE_URL=http://ai-core:8001
    depends_on:
      - ai-core

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5174:5174"
    depends_on:
      - backend
